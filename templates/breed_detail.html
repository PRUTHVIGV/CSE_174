<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ breed.name }} Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .back-btn { background: white; color: #667eea; padding: 10px 20px; border-radius: 20px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .breed-header { text-align: center; margin-bottom: 30px; }
        .breed-header h1 { color: #667eea; font-size: 2.5em; }
        .breed-header .hindi { font-size: 1.5em; color: #666; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .info-box { background: #f8f9ff; padding: 20px; border-radius: 10px; border-left: 5px solid #667eea; }
        .info-label { font-weight: bold; color: #667eea; }
        .info-value { color: #333; font-size: 1.1em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">Back to Home</a>
        </div>
        <div class="card">
            <div class="breed-header">
                <h1>{{ breed.name.replace('_', ' ') }}</h1>
                <div class="hindi">{{ breed.hindi }}</div>
            </div>
            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">Origin</div>
                    <div class="info-value">{{ breed.origin }}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Type</div>
                    <div class="info-value">{{ breed.type }}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Milk Yield</div>
                    <div class="info-value">{{ breed.milk_yield }}</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
