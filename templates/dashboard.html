{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h1 style="text-align: center; color: white; margin-bottom: 30px;">📊 Dashboard</h1>

<div class="grid grid-3">
    <div class="stat-card">
        <div class="stat-value">{{ stats.total }}</div>
        <div class="stat-label">Total Predictions</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ stats.avg_confidence }}%</div>
        <div class="stat-label">Avg Confidence</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ stats.top_breed }}</div>
        <div class="stat-label">Most Predicted</div>
    </div>
</div>

<div class="card">
    <h2 style="margin-bottom: 20px; color: var(--text-dark);">Prediction Trends</h2>
    <canvas id="trendChart" style="max-height: 300px;"></canvas>
</div>

<div class="card">
    <h2 style="margin-bottom: 20px; color: var(--text-dark);">Top Breeds</h2>
    <canvas id="breedChart" style="max-height: 300px;"></canvas>
</div>
{% endblock %}

{% block scripts %}
<script>
    const breedCounts = {{ breed_counts|safe }};
    const timeline = {{ timeline|safe }};
    
    new Chart(document.getElementById('breedChart'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(breedCounts),
            datasets: [{
                data: Object.values(breedCounts),
                backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe']
            }]
        }
    });

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: Object.keys(timeline),
            datasets: [{
                label: 'Predictions',
                data: Object.values(timeline),
                borderColor: '#667eea',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(102, 126, 234, 0.1)'
            }]
        }
    });
</script>
{% endblock %}
