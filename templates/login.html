<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cattle Recognition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="max-width: 450px; width: 100%;">
            <h1 style="text-align: center; color: var(--primary); margin-bottom: 30px;">🐄 Cattle Recognition</h1>
            <h2 style="text-align: center; color: var(--text-dark); margin-bottom: 30px;">Login</h2>
            
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;">Login</button>
            </form>

            <div style="text-align: center; margin: 20px 0; color: var(--text-light);">OR</div>

            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" 
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="sign_in_with"
                 data-shape="rectangular"
                 data-logo_alignment="left"
                 style="display: flex; justify-content: center; margin-bottom: 20px;">
            </div>

            <p style="text-align: center; color: var(--text-light);">
                Don't have an account? <a href="/signup" style="color: var(--primary); font-weight: bold;">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            fetch('/google-login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: response.credential})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert('Google login failed');
                }
            });
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert(data.error || 'Login failed');
                }
            });
        });
    </script>
</body>
</html>
