<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cattle Recognition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
        <div class="card" style="max-width:450px;width:100%;">
            <h1 style="text-align:center;color:var(--primary);margin-bottom:10px;">🐄 Cattle Recognition</h1>
            <h2 style="text-align:center;color:var(--text-dark);margin-bottom:30px;">Login</h2>

            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:15px;">
                    <input type="checkbox" id="rememberMe" style="width:auto;margin:0;">
                    <label for="rememberMe" style="color:var(--text-light);font-size:0.9em;cursor:pointer;">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-bottom:20px;">Login</button>
            </form>

            <div style="text-align:center;margin:15px 0;color:var(--text-light);">OR</div>

            {% if google_client_id %}
            <div id="g_id_onload"
                data-client_id="{{ google_client_id }}"
                data-callback="handleGoogleCredential"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="continue_with"
                data-shape="rectangular"
                data-logo_alignment="left"
                style="display:flex;justify-content:center;margin-bottom:20px;">
            </div>
            {% else %}
            <button onclick="showGoogleDemo()" class="btn" style="width:100%;background:white;color:#333;border:2px solid #ddd;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px;">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><path d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z" fill="#4285F4"/><path d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z" fill="#34A853"/><path d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z" fill="#FBBC05"/><path d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z" fill="#EA4335"/></g></svg>
                Continue with Google
            </button>
            <div id="googleDemoForm" style="display:none;background:var(--bg-light);padding:15px;border-radius:10px;margin-bottom:15px;">
                <p style="color:var(--text-light);font-size:0.85em;margin-bottom:10px;">⚠️ Demo mode - enter any Google email</p>
                <input type="email" id="gEmail" placeholder="your@gmail.com" style="margin-bottom:8px;">
                <input type="text" id="gName" placeholder="Your Name" style="margin-bottom:8px;">
                <button onclick="submitGoogleDemo()" class="btn btn-primary" style="width:100%;">Continue</button>
            </div>
            {% endif %}

            <p style="text-align:center;color:var(--text-light);">
                Don't have an account? <a href="/signup" style="color:var(--primary);font-weight:bold;">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        // Real Google GSI callback
        function handleGoogleCredential(response) {
            fetch('/google-authenticate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({credential: response.credential})
            }).then(r => r.json()).then(d => {
                if (d.success) window.location.href = '/';
                else alert(d.error || 'Google login failed');
            });
        }

        // Demo mode (no client ID)
        function showGoogleDemo() {
            document.getElementById('googleDemoForm').style.display = 'block';
        }
        function submitGoogleDemo() {
            const email = document.getElementById('gEmail').value;
            const name = document.getElementById('gName').value;
            if (!email) return alert('Enter email');
            fetch('/google-authenticate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, name})
            }).then(r => r.json()).then(d => {
                if (d.success) window.location.href = '/';
                else alert(d.error || 'Failed');
            });
        }

        // Remember me
        const remembered = localStorage.getItem('rememberedEmail');
        if (remembered) { document.getElementById('email').value = remembered; document.getElementById('rememberMe').checked = true; }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (document.getElementById('rememberMe').checked) localStorage.setItem('rememberedEmail', email);
            else localStorage.removeItem('rememberedEmail');
            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            }).then(r => r.json()).then(d => {
                if (d.success) window.location.href = '/';
                else alert(d.error || 'Login failed');
            });
        });
    </script>
</body>
</html>
