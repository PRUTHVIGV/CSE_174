<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Cattle Recognition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { max-width: 420px; width: 100%; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-light); font-size: 0.85em; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .google-btn {
            width: 100%; padding: 11px 20px; background: var(--bg-card); color: var(--text-dark);
            border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95em; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s; margin-bottom: 4px;
        }
        .google-btn:hover { border-color: var(--primary); box-shadow: var(--shadow); }
        .error-msg  { background: #fdecea; color: #c0392b; padding: 10px 14px; border-radius: 8px; font-size: 0.88em; margin-bottom: 14px; display: none; }
        .success-msg { background: #eafaf1; color: #1e8449; padding: 10px 14px; border-radius: 8px; font-size: 0.88em; margin-bottom: 14px; display: none; }
        .strength-bar { height: 4px; border-radius: 4px; margin-top: -10px; margin-bottom: 14px; transition: all 0.3s; background: var(--border); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="card">
            <div style="text-align:center; margin-bottom:28px;">
                <div style="font-size:2.8em; margin-bottom:8px;">🐄</div>
                <h1 style="color:var(--primary); font-size:1.5em; margin-bottom:4px;">Create Account</h1>
                <p style="color:var(--text-light); font-size:0.9em;">Join to identify cattle breeds</p>
            </div>

            <div class="error-msg"   id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <!-- Google Sign-Up -->
            <div id="g_id_onload"
                data-client_id="YOUR_GOOGLE_CLIENT_ID"
                data-callback="handleGoogleCredential"
                data-auto_prompt="false">
            </div>
            <button class="google-btn" onclick="triggerGoogleSignIn()">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><path d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z" fill="#4285F4"/><path d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z" fill="#34A853"/><path d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z" fill="#FBBC05"/><path d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z" fill="#EA4335"/></g></svg>
                Sign up with Google
            </button>

            <div class="divider">or create with email</div>

            <form id="signupForm">
                <input type="text"     id="name"            placeholder="Full name"        required autocomplete="name">
                <input type="email"    id="email"           placeholder="Email address"    required autocomplete="email">
                <input type="password" id="password"        placeholder="Password (min 6)" required minlength="6" oninput="checkStrength(this.value)">
                <div class="strength-bar" id="strengthBar"></div>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="signupBtn">Create Account</button>
            </form>

            <p style="text-align:center; color:var(--text-light); margin-top:20px; font-size:0.9em;">
                Already have an account? <a href="/login" style="color:var(--primary); font-weight:600;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
    function showError(msg)   { const e = document.getElementById('errorMsg');   e.textContent = msg; e.style.display = 'block'; document.getElementById('successMsg').style.display = 'none'; }
    function showSuccess(msg) { const e = document.getElementById('successMsg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('errorMsg').style.display = 'none'; }

    function checkStrength(val) {
        const bar = document.getElementById('strengthBar');
        if (!val) { bar.style.width = '0'; return; }
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['#e63946','#f4a261','#e9c46a','#2d6a4f','#2d6a4f'];
        const widths  = ['20%','40%','60%','80%','100%'];
        bar.style.background = colors[score - 1] || '#e0e0e0';
        bar.style.width = widths[score - 1] || '0';
    }

    // Google GSI — uses real GSI if Client ID is configured, else demo modal
    const GOOGLE_CONFIGURED = document.getElementById('g_id_onload')
        .dataset.client_id !== 'YOUR_GOOGLE_CLIENT_ID';

    function triggerGoogleSignIn() {
        if (GOOGLE_CONFIGURED && window.google && google.accounts) google.accounts.id.prompt();
        else showGoogleModal();
    }

    function handleGoogleCredential(response) {
        fetch('/google-authenticate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential: response.credential })
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) { showSuccess('Account ready! Redirecting...'); setTimeout(() => window.location.href = '/', 800); }
            else showError(d.error || 'Google sign-up failed');
        })
        .catch(() => showError('Network error. Please try again.'));
    }

    let _googleOverlay = null;

    function showGoogleModal() {
        _googleOverlay = document.createElement('div');
        _googleOverlay.id = 'googleOverlay';
        _googleOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
        _googleOverlay.innerHTML = `
            <div style="background:white;border-radius:12px;padding:32px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                <div style="text-align:center;margin-bottom:20px;">
                    <svg width="40" height="40" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    <h3 style="color:#202124;margin:12px 0 4px;font-size:1.1em;">Sign up with Google</h3>
                    <p style="color:#5f6368;font-size:0.85em;">Enter your Google account details</p>
                </div>
                <input type="text"  id="gName"  placeholder="Your name"    style="width:100%;padding:10px 14px;border:1px solid #dadce0;border-radius:6px;margin-bottom:10px;font-size:0.95em;box-sizing:border-box;color:#333;">
                <input type="email" id="gEmail" placeholder="Gmail address" style="width:100%;padding:10px 14px;border:1px solid #dadce0;border-radius:6px;margin-bottom:6px;font-size:0.95em;box-sizing:border-box;color:#333;">
                <div id="gError" style="color:#c0392b;font-size:0.82em;min-height:20px;margin-bottom:10px;"></div>
                <div style="display:flex;gap:10px;">
                    <button id="gCancelBtn" style="flex:1;padding:10px;border:1px solid #dadce0;border-radius:6px;background:white;cursor:pointer;font-size:0.9em;color:#333;">Cancel</button>
                    <button id="gContinueBtn" style="flex:1;padding:10px;background:#1a73e8;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.9em;font-weight:500;">Continue</button>
                </div>
            </div>`;
        document.body.appendChild(_googleOverlay);
        document.getElementById('gCancelBtn').addEventListener('click', () => { _googleOverlay.remove(); _googleOverlay = null; });
        document.getElementById('gContinueBtn').addEventListener('click', submitGoogleDemo);
    }

    function submitGoogleDemo() {
        const name  = document.getElementById('gName').value.trim();
        const email = document.getElementById('gEmail').value.trim();
        const errEl = document.getElementById('gError');
        if (!name)  { errEl.textContent = 'Please enter your name.';  return; }
        if (!email) { errEl.textContent = 'Please enter your email.'; return; }
        errEl.textContent = '';
        const btn = document.getElementById('gContinueBtn');
        btn.disabled = true;
        btn.textContent = 'Creating...';
        fetch('/google-authenticate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) { showSuccess('Account ready! Redirecting...'); setTimeout(() => window.location.href = '/', 800); }
            else { errEl.textContent = d.error || 'Sign-up failed.'; btn.disabled = false; btn.textContent = 'Continue'; }
        })
        .catch(() => { errEl.textContent = 'Network error. Try again.'; btn.disabled = false; btn.textContent = 'Continue'; });
    }

    // Email signup
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirmPassword').value;
        const btn      = document.getElementById('signupBtn');

        document.getElementById('errorMsg').style.display = 'none';

        if (password !== confirm) { showError('Passwords do not match'); return; }
        if (password.length < 6)  { showError('Password must be at least 6 characters'); return; }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
            const r = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const d = await r.json();
            if (d.success) { showSuccess('Account created! Redirecting...'); setTimeout(() => window.location.href = '/', 800); }
            else { showError(d.error || 'Signup failed'); btn.disabled = false; btn.textContent = 'Create Account'; }
        } catch {
            showError('Network error. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    });
    </script>
</body>
</html>
