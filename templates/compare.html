{% extends "base.html" %}

{% block title %}{{ t.compare }}{% endblock %}

{% block content %}
<h2 style="color:var(--text-dark); margin-bottom:20px;">🔄 {{ t.compare }}</h2>

<div class="card">
    <div class="grid grid-3" style="margin-bottom: 20px;">
        <select id="breed1">
            <option value="">Select Breed 1</option>
            {% for breed in breeds %}
            <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
            {% endfor %}
        </select>
        <select id="breed2">
            <option value="">Select Breed 2</option>
            {% for breed in breeds %}
            <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
            {% endfor %}
        </select>
        <select id="breed3">
            <option value="">Select Breed 3 (Optional)</option>
            {% for breed in breeds %}
            <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
            {% endfor %}
        </select>
    </div>
    <button class="btn btn-primary" onclick="compare()" style="width: 100%;">Compare Breeds</button>
    
    <div id="results" style="display:none; margin-top: 30px;">
        <div class="grid grid-3" id="comparison"></div>
        <div style="margin-top: 30px;">
            <canvas id="chart"></canvas>
        </div>
        <div style="margin-top: 30px;">
            <h3 style="color:var(--text-dark); margin-bottom:15px;">Attribute Radar</h3>
            <canvas id="radarChart" style="max-height:350px;"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const breedsData = {{ breeds_json|safe }};
    
    function compare() {
        const b1 = document.getElementById('breed1').value;
        const b2 = document.getElementById('breed2').value;
        const b3 = document.getElementById('breed3').value;
        
        if (!b1 || !b2) {
            alert('Please select at least 2 breeds');
            return;
        }
        
        const breeds = [b1, b2];
        if (b3) breeds.push(b3);
        
        const comparison = document.getElementById('comparison');
        comparison.innerHTML = '';
        
        breeds.forEach(breed => {
            const data = breedsData[breed];
            const div = document.createElement('div');
            div.style.cssText = 'background: var(--bg-light); padding: 30px; border-radius: 15px;';
            div.innerHTML = `
                <h2 style="color: var(--primary); margin-bottom: 20px; text-align: center;">${breed.replace(/_/g, ' ')}</h2>
                <div style="background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                    <div style="font-weight: bold; color: var(--text-light);">Origin</div>
                    <div style="color: var(--text-dark); font-size: 1.1em;">${data.origin}</div>
                </div>
                <div style="background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                    <div style="font-weight: bold; color: var(--text-light);">Type</div>
                    <div style="color: var(--text-dark); font-size: 1.1em;">${data.type}</div>
                </div>
                <div style="background: var(--bg-card); padding: 15px; border-radius: 10px;">
                    <div style="font-weight: bold; color: var(--text-light);">Milk Yield</div>
                    <div style="color: var(--text-dark); font-size: 1.1em;">${data.milk_yield}</div>
                </div>
            `;
            comparison.appendChild(div);
        });
        
        const ctx = document.getElementById('chart').getContext('2d');
        const milkYields = breeds.map(b => {
            const yield_str = breedsData[b].milk_yield;
            const match = yield_str.match(/(\d+)-(\d+)/);
            return match ? (parseInt(match[1]) + parseInt(match[2])) / 2 : 0;
        });

        // Radar chart scores
        function milkScore(b) {
            const m = breedsData[b].milk_yield.match(/(\d+)-(\d+)/);
            return m ? Math.round(((parseInt(m[1])+parseInt(m[2]))/2)/35*100) : 10;
        }
        function typeScore(b, attr) {
            const t = breedsData[b].type;
            if(attr==='dairy') return t==='Dairy'?100:t==='Dual Purpose'?60:20;
            if(attr==='draught') return t==='Draught'?100:t==='Dual Purpose'?60:20;
            return 50;
        }

        if (window.myChart) window.myChart.destroy();
        if (window.myRadar) window.myRadar.destroy();

        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: breeds.map(b => b.replace(/_/g, ' ')),
                datasets: [{ label: 'Avg Milk Yield (L/day)', data: milkYields, backgroundColor: ['#667eea','#764ba2','#f093fb'] }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });

        const radarCtx = document.getElementById('radarChart').getContext('2d');
        const colors = ['rgba(102,126,234,0.4)','rgba(118,75,162,0.4)','rgba(240,147,251,0.4)'];
        const borderColors = ['#667eea','#764ba2','#f093fb'];
        window.myRadar = new Chart(radarCtx, {
            type: 'radar',
            data: {
                labels: ['Milk Yield','Dairy','Draught','Versatility'],
                datasets: breeds.map((b,i) => ({
                    label: b.replace(/_/g,' '),
                    data: [milkScore(b), typeScore(b,'dairy'), typeScore(b,'draught'), breedsData[b].type==='Dual Purpose'?90:40],
                    backgroundColor: colors[i],
                    borderColor: borderColors[i],
                    borderWidth: 2
                }))
            },
            options: { scales: { r: { beginAtZero: true, max: 100 } } }
        });
        
        document.getElementById('results').style.display = 'block';
    }
</script>
{% endblock %}
