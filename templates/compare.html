{% extends "base.html" %}

{% block title %}Compare Breeds{% endblock %}

{% block content %}
<h1 style="text-align: center; color: white; margin-bottom: 30px;">🔄 Breed Comparison</h1>

<div class="card">
    <div class="grid grid-3" style="margin-bottom: 20px;">
        <select id="breed1">
            <option value="">Select Breed 1</option>
            {% for breed in breeds %}
            <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
            {% endfor %}
        </select>
        <select id="breed2">
            <option value="">Select Breed 2</option>
            {% for breed in breeds %}
            <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
            {% endfor %}
        </select>
        <select id="breed3">
            <option value="">Select Breed 3 (Optional)</option>
            {% for breed in breeds %}
            <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
            {% endfor %}
        </select>
    </div>
    <button class="btn btn-primary" onclick="compare()" style="width: 100%;">Compare Breeds</button>
    
    <div id="results" style="display:none; margin-top: 30px;">
        <div class="grid grid-3" id="comparison"></div>
        <div style="margin-top: 30px;">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const breedsData = {{ breeds_json|safe }};
    
    function compare() {
        const b1 = document.getElementById('breed1').value;
        const b2 = document.getElementById('breed2').value;
        const b3 = document.getElementById('breed3').value;
        
        if (!b1 || !b2) {
            alert('Please select at least 2 breeds');
            return;
        }
        
        const breeds = [b1, b2];
        if (b3) breeds.push(b3);
        
        const comparison = document.getElementById('comparison');
        comparison.innerHTML = '';
        
        breeds.forEach(breed => {
            const data = breedsData[breed];
            const div = document.createElement('div');
            div.style.cssText = 'background: var(--bg-light); padding: 30px; border-radius: 15px;';
            div.innerHTML = `
                <h2 style="color: var(--primary); margin-bottom: 20px; text-align: center;">${breed.replace(/_/g, ' ')}</h2>
                <div style="background: var(--white); padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                    <div style="font-weight: bold; color: var(--text-light);">Origin</div>
                    <div style="color: var(--text-dark); font-size: 1.1em;">${data.origin}</div>
                </div>
                <div style="background: var(--white); padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                    <div style="font-weight: bold; color: var(--text-light);">Type</div>
                    <div style="color: var(--text-dark); font-size: 1.1em;">${data.type}</div>
                </div>
                <div style="background: var(--white); padding: 15px; border-radius: 10px;">
                    <div style="font-weight: bold; color: var(--text-light);">Milk Yield</div>
                    <div style="color: var(--text-dark); font-size: 1.1em;">${data.milk_yield}</div>
                </div>
            `;
            comparison.appendChild(div);
        });
        
        const ctx = document.getElementById('chart').getContext('2d');
        const milkYields = breeds.map(b => {
            const yield_str = breedsData[b].milk_yield;
            const match = yield_str.match(/(\d+)-(\d+)/);
            return match ? (parseInt(match[1]) + parseInt(match[2])) / 2 : 0;
        });
        
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: breeds.map(b => b.replace(/_/g, ' ')),
                datasets: [{
                    label: 'Average Milk Yield (L/day)',
                    data: milkYields,
                    backgroundColor: ['#667eea', '#764ba2', '#f093fb']
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });
        
        document.getElementById('results').style.display = 'block';
    }
</script>
{% endblock %}
