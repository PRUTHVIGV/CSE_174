{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div style="max-width:500px; margin:0 auto;">
    <h1 style="color:white; margin-bottom:20px;">🔑 Change Password</h1>
    <div class="card">
        <input type="password" id="current" placeholder="Current Password">
        <input type="password" id="newPass" placeholder="New Password">
        <input type="password" id="confirm" placeholder="Confirm New Password">
        <div id="msg" style="margin-bottom:15px; color:red; font-size:0.9em;"></div>
        <button onclick="changePass()" class="btn btn-primary" style="width:100%;">Update Password</button>
        <a href="/profile" style="display:block; text-align:center; margin-top:15px; color:var(--primary);">← Back to Profile</a>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function changePass(){
    const current = document.getElementById('current').value;
    const newPass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirm').value;
    const msg = document.getElementById('msg');
    if(newPass !== confirm){ msg.textContent = 'Passwords do not match'; return; }
    if(newPass.length < 6){ msg.textContent = 'Password must be at least 6 characters'; return; }
    fetch('/change-password',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({current, new: newPass})
    }).then(r=>r.json()).then(d=>{
        if(d.success){ msg.style.color='green'; msg.textContent='✅ Password updated!'; showToast('Password updated successfully!'); }
        else { msg.style.color='red'; msg.textContent = d.error; showToast(d.error, 'error'); }
    });
}
</script>
{% endblock %}
