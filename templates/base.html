<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cattle Breed Recognition{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    {% if session.user %}
    <nav class="navbar">
        <div class="nav-brand">🐄 Cattle Recognition - CSE 174</div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/history" class="nav-link">History</a>
            <a href="/compare" class="nav-link">Compare</a>
            <a href="/features" class="nav-link">Features</a>
            <a href="/suggest" class="nav-link">💡 Suggest</a>
            <a href="/team" class="nav-link">Team</a>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; color: white;">
                    👤 {{ session.user.name }}
                </div>
                <a href="/logout" class="nav-link logout">Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
