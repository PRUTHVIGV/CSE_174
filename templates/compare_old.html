<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breed Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .back-btn { background: white; color: #667eea; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .selector { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        select { padding: 15px; border-radius: 10px; border: 2px solid #667eea; font-size: 1em; flex: 1; min-width: 200px; }
        .compare-btn { background: #667eea; color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1.1em; }
        .compare-btn:hover { background: #5568d3; }
        .comparison { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .breed-col { background: #f8f9ff; padding: 30px; border-radius: 15px; }
        .breed-col h2 { color: #667eea; margin-bottom: 20px; text-align: center; }
        .stat { margin-bottom: 15px; padding: 15px; background: white; border-radius: 10px; }
        .stat-label { font-weight: bold; color: #666; margin-bottom: 5px; }
        .stat-value { color: #333; font-size: 1.1em; }
        .chart { margin-top: 30px; }
        canvas { max-width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 Breed Comparison</h1>
            <p>Compare cattle breeds side-by-side</p>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/'">← Back to Home</button>
        
        <div class="card">
            <div class="selector">
                <select id="breed1">
                    <option value="">Select Breed 1</option>
                    {% for breed in breeds %}
                    <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
                    {% endfor %}
                </select>
                <select id="breed2">
                    <option value="">Select Breed 2</option>
                    {% for breed in breeds %}
                    <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
                    {% endfor %}
                </select>
                <select id="breed3">
                    <option value="">Select Breed 3 (Optional)</option>
                    {% for breed in breeds %}
                    <option value="{{ breed }}">{{ breed.replace('_', ' ') }}</option>
                    {% endfor %}
                </select>
                <button class="compare-btn" onclick="compare()">Compare</button>
            </div>
            
            <div id="results" style="display:none;">
                <div class="comparison" id="comparison"></div>
                <div class="chart">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const breedsData = {{ breeds_json|safe }};
        
        function compare() {
            const b1 = document.getElementById('breed1').value;
            const b2 = document.getElementById('breed2').value;
            const b3 = document.getElementById('breed3').value;
            
            if (!b1 || !b2) {
                alert('Please select at least 2 breeds');
                return;
            }
            
            const breeds = [b1, b2];
            if (b3) breeds.push(b3);
            
            const comparison = document.getElementById('comparison');
            comparison.innerHTML = '';
            
            breeds.forEach(breed => {
                const data = breedsData[breed];
                const div = document.createElement('div');
                div.className = 'breed-col';
                div.innerHTML = `
                    <h2>${breed.replace(/_/g, ' ')}</h2>
                    <div class="stat">
                        <div class="stat-label">Origin</div>
                        <div class="stat-value">${data.origin}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Type</div>
                        <div class="stat-value">${data.type}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Milk Yield</div>
                        <div class="stat-value">${data.milk_yield}</div>
                    </div>
                `;
                comparison.appendChild(div);
            });
            
            // Chart
            const ctx = document.getElementById('chart').getContext('2d');
            const milkYields = breeds.map(b => {
                const yield_str = breedsData[b].milk_yield;
                const match = yield_str.match(/(\d+)-(\d+)/);
                return match ? (parseInt(match[1]) + parseInt(match[2])) / 2 : 0;
            });
            
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: breeds.map(b => b.replace(/_/g, ' ')),
                    datasets: [{
                        label: 'Average Milk Yield (L/day)',
                        data: milkYields,
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb']
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
            
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
