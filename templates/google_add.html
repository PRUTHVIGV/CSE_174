<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Google Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="max-width: 450px; width: 100%;">
            <h1 style="text-align: center; color: var(--primary); margin-bottom: 30px;">Sign in with Google</h1>
            
            <form id="googleForm">
                <input type="email" id="email" placeholder="Email or phone" required>
                <input type="password" id="password" placeholder="Enter your password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Next</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/google-select" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Back</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('googleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            fetch('/google-authenticate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, name: email.split('@')[0]})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                }
            });
        });
    </script>
</body>
</html>
