{% extends "base.html" %}
{% block title %}Camera Capture{% endblock %}

{% block content %}
<h2 style="color:var(--text-dark); margin-bottom:20px;">📷 Camera Capture</h2>

<div class="card" style="text-align:center;">
    <video id="video" autoplay playsinline style="width:100%; max-width:560px; border-radius:12px; display:none; margin:0 auto;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="capturedImage" style="width:100%; max-width:560px; border-radius:12px; display:none; margin:0 auto;">

    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:20px;">
        <button id="startBtn"   onclick="startCamera()"        class="btn btn-primary">📷 Start Camera</button>
        <button id="flipBtn"    onclick="flipCamera()"         class="btn btn-primary" style="display:none;">🔄 Flip</button>
        <button id="captureBtn" onclick="capture()"            class="btn btn-primary" style="display:none;">📸 Capture</button>
        <button id="retakeBtn"  onclick="retake()"             style="display:none; background:var(--bg-light); color:var(--text-dark); border:1px solid var(--border); padding:10px 24px; border-radius:8px; cursor:pointer; font-weight:600;">Retake</button>
        <button id="predictBtn" onclick="predictFromCamera()"  class="btn btn-primary" style="display:none;">🔍 Predict</button>
    </div>

    <div id="cameraResults" style="margin-top:28px; display:none; text-align:left;">
        <h3 style="color:var(--text-dark); margin-bottom:14px;">Prediction Results</h3>
        <div id="camPredictions"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let stream = null;
let capturedBlob = null;
let facingMode = 'environment';

async function startCamera() {
    try {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } });
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.style.display = 'block';
        document.getElementById('startBtn').style.display   = 'none';
        document.getElementById('flipBtn').style.display    = 'inline-block';
        document.getElementById('captureBtn').style.display = 'inline-block';
    } catch (err) {
        showToast('Camera not available. Check permissions.', 'error');
    }
}

function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
}

function capture() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
        capturedBlob = blob;
        const img = document.getElementById('capturedImage');
        img.src = URL.createObjectURL(blob);
        img.style.display = 'block';
        video.style.display = 'none';
        if (stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('flipBtn').style.display    = 'none';
        document.getElementById('captureBtn').style.display = 'none';
        document.getElementById('retakeBtn').style.display  = 'inline-block';
        document.getElementById('predictBtn').style.display = 'inline-block';
    }, 'image/jpeg');
}

function retake() {
    document.getElementById('capturedImage').style.display = 'none';
    document.getElementById('retakeBtn').style.display     = 'none';
    document.getElementById('predictBtn').style.display    = 'none';
    document.getElementById('cameraResults').style.display = 'none';
    startCamera();
}

async function predictFromCamera() {
    const formData = new FormData();
    formData.append('file', capturedBlob, 'camera.jpg');
    document.getElementById('cameraResults').style.display = 'block';
    document.getElementById('camPredictions').innerHTML = '<div class="skeleton" style="height:70px;margin-bottom:8px;"></div><div class="skeleton" style="height:70px;margin-bottom:8px;"></div><div class="skeleton" style="height:70px;"></div>';

    try {
        const res  = await fetch('/predict', { method: 'POST', body: formData });
        const data = await res.json();
        if (!data.success) { showToast(data.error || 'Prediction failed', 'error'); return; }

        document.getElementById('camPredictions').innerHTML = '';
        data.predictions.forEach((pred, idx) => {
            const div = document.createElement('div');
            div.style.cssText = `background:var(--bg-light); padding:16px 20px; border-radius:10px; margin-bottom:10px; border-left:4px solid var(--${idx === 0 ? 'primary' : 'accent'}); display:flex; justify-content:space-between; align-items:center;`;
            div.innerHTML = `
                <div>
                    <div style="font-weight:700; color:var(--text-dark); font-size:1.1em;">${pred.breed.replace(/_/g,' ')}</div>
                    <div style="color:var(--text-light); font-size:0.85em; margin-top:4px;">${pred.info.origin} · ${pred.info.type} · ${pred.info.milk_yield}</div>
                </div>
                <span style="background:var(--primary); color:white; padding:4px 12px; border-radius:20px; font-weight:600;">${Math.round(pred.confidence)}%</span>
            `;
            document.getElementById('camPredictions').appendChild(div);
        });
        showToast('Prediction complete!', 'success');
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
}
</script>
{% endblock %}
